name: Generate Plan from Issue

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-plan-pr:
    if: contains(github.event.issue.labels.*.name, 'plan')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive week filename
        id: week
        run: |
          YEAR=$(date +'%Y')
          WEEK=$(date +'%-V')
          echo "filename=${YEAR}-W${WEEK}" >> $GITHUB_OUTPUT

      - name: Create Markdown file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          DIRECTORY="apps/weshipit/pages/plan"
          FILEPATH="$DIRECTORY/${{ steps.week.outputs.filename }}.md"
          mkdir -p "$DIRECTORY"
          printf '%s' "$ISSUE_BODY" > "$FILEPATH"

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add plan ${{ steps.week.outputs.filename }}"
          title: "Plan ${{ steps.week.outputs.filename }}"
          body: "Automated PR created from issue #${{ github.event.issue.number }}\n\nCloses #${{ github.event.issue.number }}"
          branch: "plan/${{ steps.week.outputs.filename }}"
          delete-branch: true

      - name: Enable Auto-Merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash
