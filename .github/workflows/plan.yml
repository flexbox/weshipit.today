name: Generate Plan from Issue

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-plan-pr:
    if: contains(github.event.issue.labels.*.name, 'plan')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Markdown file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          DIRECTORY="apps/weshipit/pages/plan"
          FILEPATH="$DIRECTORY/${ISSUE_TITLE}.md"
          mkdir -p "$DIRECTORY"
          printf '%s' "$ISSUE_BODY" > "$FILEPATH"

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: 🎸 add plan ${{ github.event.issue.title }}"
          title: "Plan ${{ github.event.issue.title }}"
          body: "Automated PR created from issue #${{ github.event.issue.number }}\n\nCloses #${{ github.event.issue.number }}"
          branch: "plan/${{ github.event.issue.title }}"
          delete-branch: true

      - name: Enable Auto-Merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash
